<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="XGFiWYSEnfhPZ4k-05lRslr1jcFH7zCwyYfx40QtFKQ" />
    
    <title>SlangPedia | Viral Internet Slangs & Global Dictionary 2026</title>
    <meta name="description" content="Get instant meanings for Rizz, Sigma, Aura, and 100+ trending internet slangs. The world's fastest multi-language dictionary for Gen-Z lingo.">
    <meta name="keywords" content="SlangPedia, internet slang, rizz meaning, sigma meaning, aura points, viral words 2026, gen z dictionary, what is skibidi">
    <meta name="author" content="SlangPedia Team">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    
    <link rel="canonical" href="https://slangpedia.github.io/">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://slangpedia.github.io/SlangPedia/",
      "name": "SlangPedia",
      "description": "Ultimate Global Slang Dictionary",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://slangpedia.github.io/SlangPedia/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <style>
        :root { --primary: #00ff88; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; line-height: 1.6; }
        
        #google_translate_element { align-self: flex-end; margin-bottom: 15px; border-radius: 5px; overflow: hidden; opacity: 0.9; }

        .header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); font-size: 3rem; margin: 0; text-shadow: 0 0 20px rgba(0,255,136,0.4); font-weight: 800; letter-spacing: -1px; }
        .tagline { opacity: 0.8; font-size: 1.1rem; margin-top: 5px; }

        .search-box { width: 100%; max-width: 600px; position: relative; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 50px; }
        #searchInput { width: 100%; padding: 18px 25px; border-radius: 50px; border: 2px solid var(--primary); background: var(--card); color: white; font-size: 1.2rem; outline: none; box-sizing: border-box; transition: 0.3s; }
        #searchInput:focus { border-color: #fff; box-shadow: 0 0 20px rgba(0,255,136,0.6); }
        #searchBtn { position: absolute; right: 8px; top: 8px; background: var(--primary); border: none; padding: 12px 30px; border-radius: 40px; cursor: pointer; font-weight: bold; color: #0f172a; font-size: 1rem; }

        #resultArea { width: 100%; max-width: 800px; margin-bottom: 30px; }
        .slang-card { background: var(--card); padding: 35px; border-radius: 20px; border-left: 8px solid var(--primary); animation: slideUp 0.4s ease; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .word-title { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; text-transform: capitalize; }
        .meaning { font-size: 1.3rem; color: #e2e8f0; }

        .section-title { width: 100%; max-width: 850px; font-size: 1.5rem; color: var(--primary); margin: 30px 0 15px; text-align: left; font-weight: bold; border-left: 5px solid var(--primary); padding-left: 15px; }
        
        .trending-grid { width: 100%; max-width: 850px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 50px; }
        .word-pill { background: #1e293b; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #334155; transition: 0.4s; font-weight: bold; color: #94a3b8; }
        .word-pill:hover { background: var(--primary); color: #0f172a; transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,255,136,0.3); }

        footer { margin-top: auto; padding: 40px; opacity: 0.6; text-align: center; border-top: 1px solid #334155; width: 100%; font-size: 0.9rem; }
        .loading { display: none; color: var(--primary); font-weight: bold; margin-bottom: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div class="header">
        <h1>SlangPedia ⚡</h1>
        <p class="tagline">Global Viral Slangs • Instant Meanings • Multi-Language</p>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search Rizz, Sigma, or any word...">
        <button id="searchBtn" onclick="smartSearch()">Search</button>
    </div>

    <div id="resultArea">
        <div id="loader" class="loading">Scanning Global Slang Database...</div>
        <div id="dynamicResult"></div>
    </div>

    <div class="section-title">🔥 60+ Trending Slangs (Tap for Meaning)</div>
    <div class="trending-grid" id="pillContainer"></div>

    <footer>
        <strong>SlangPedia © 2026</strong><br>
        Optimized for Google Search & Global Users.<br>
        <em>Understand the internet, one slang at a time.</em>
    </footer>

    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
        }

        const mySlangs = {
            "rizz": "Charisma or the ability to attract a romantic partner effortlessly.",
            "sigma": "An independent, successful person who chooses to live outside social hierarchies.",
            "aura": "The vibe or energy someone radiates. Points are gained or lost based on actions.",
            "skibidi": "Filler word from a viral meme series, often used for something weird.",
            "gyatt": "Exclamation used to express surprise or attraction at someone's physique.",
            "fanum tax": "Playfully stealing a bit of someone's food, popularized by creator Fanum.",
            "cooked": "Being in a hopeless situation or failing completely.",
            "delulu": "Being delusional, especially about romantic expectations.",
            "mewing": "A tongue exercise aimed at defining the jawline.",
            "no cap": "Means 'no lie' or 'honestly'.",
            "sus": "Short for suspicious; acting fake or dishonest.",
            "bet": "Agreeing to a deal or accepting a challenge.",
            "slay": "Doing something exceptionally well or looking stylish.",
            "tea": "Gossip or secret information.",
            "ghosting": "Suddenly stopping all communication with someone.",
            "glow up": "A major positive transformation in appearance.",
            "clout": "Social media influence or fame.",
            "lowkey": "Secretly or quietly feeling something.",
            "highkey": "Openly and loudly expressing a feeling.",
            "ratio": "When a reply gets more likes than the original post.",
            "main character": "Acting with supreme confidence like the star of a movie.",
            "mid": "Something average or mediocre; not impressive.",
            "periodt": "Used at the end of a sentence to show that the discussion is finished.",
            "snatched": "Used when someone looks very good, especially their outfit or body shape.",
            "bussin": "Used to describe food that is extremely tasty and flavorful.",
            "drip": "Having a very high sense of style, fashion, or expensive accessories.",
            "ick": "A sudden feeling of disgust for someone you were previously attracted to.",
            "mood": "Used when you find something relatable to your own current state or feelings.",
            "savage": "Someone who is bold, fierce, and doesn't care about what others think.",
            "simp": "Someone who does too much for their crush without getting any attention back.",
            "yeet": "To throw something with force or an exclamation of pure excitement.",
            "cringe": "Something that makes you feel awkward or embarrassed on behalf of someone else.",
            "goated": "Greatest Of All Time; the best in a category.",
            "flex": "To show off possessions or success.",
            "W": "Short for 'Win'; something good happened.",
            "L": "Short for 'Loss'; something bad happened.",
            "valid": "Something that is true, acceptable, or very cool.",
            "zesty": "Someone who is very energetic, lively, or flamboyant.",
            "basic": "Someone who only follows mainstream trends and has no unique style.",
            "clutch": "Doing exactly what is needed at a very critical or difficult moment.",
            "dead": "Used when something is so funny you're 'dead' from laughing.",
            "fire": "Something that is amazing, cool, or very impressive.",
            "pressed": "Being annoyed or upset by something someone else said or did.",
            "shook": "Being shocked, surprised, or startled by a piece of news.",
            "finesse": "To skillfully handle a situation or trick someone to your advantage.",
            "fam": "Close friends or people you consider as family.",
            "hella": "An intensifier meaning 'very' or 'a lot'.",
            "living my best life": "Being happy and successful regardless of others' opinions.",
            "salty": "Being bitter or upset over a small or minor thing.",
            "gucci": "Everything is good, fine, or cool.",
            "on fleek": "Perfectly done; usually used for eyebrows or fashion.",
            "it's giving": "Used to describe the vibe of something; like 'It's giving 90s'.",
            "finna": "Short for 'fixing to'; about to do something.",
            "slat": "Slime Love All the Time; used in hip-hop culture.",
            "pog": "Exclamation of excitement; Play of the Game."
        };

        const pillContainer = document.getElementById('pillContainer');
        Object.keys(mySlangs).forEach(word => {
            let pill = document.createElement('div');
            pill.className = 'word-pill';
            pill.innerText = word.toUpperCase();
            pill.onclick = () => {
                document.getElementById('searchInput').value = word;
                showResult(word, mySlangs[word], "Trending Slang");
                window.scrollTo({top: 0, behavior: 'smooth'});
            };
            pillContainer.appendChild(pill);
        });

        async function smartSearch() {
            const input = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultDiv = document.getElementById('dynamicResult');
            const loader = document.getElementById('loader');

            if (!input) return;
            resultDiv.innerHTML = "";
            loader.style.display = "block";

            if (mySlangs[input]) {
                loader.style.display = "none";
                showResult(input, mySlangs[input], "Verified Trending Slang");
                return;
            }

            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${input}`);
                const data = await response.json();
                loader.style.display = "none";
                if (!data.title) {
                    showResult(data[0].word, data[0].meanings[0].definitions[0].definition, data[0].meanings[0].partOfSpeech);
                } else {
                    resultDiv.innerHTML = `<div class="slang-card"><div class="meaning">Word not found in our viral database. Please try another word or click a slang below!</div></div>`;
                }
            } catch (e) {
                loader.style.display = "none";
                resultDiv.innerHTML = `<div class="slang-card">Connection error. Try again.</div>`;
            }
        }

        function showResult(word, meaning, type) {
            document.getElementById('dynamicResult').innerHTML = `
                <div class="slang-card">
                    <div style="color:var(--primary); font-size:0.9rem; font-weight:bold; margin-bottom:5px;">${type.toUpperCase()}</div>
                    <div class="word-title">${word}</div>
                    <div class="meaning">${meaning}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
