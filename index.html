<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlangPedia | Global Multi-Language Dictionary</title>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Language Translator Box */
        #google_translate_element { margin-bottom: 20px; align-self: flex-end; }

        .header { text-align: center; margin-bottom: 25px; }
        h1 { color: var(--primary); font-size: 2.5rem; margin: 0; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        
        .search-box { width: 100%; max-width: 550px; position: relative; margin-bottom: 25px; }
        #searchInput { width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid var(--primary); background: var(--card); color: white; font-size: 1.1rem; outline: none; box-sizing: border-box; }
        #searchBtn { position: absolute; right: 8px; top: 7px; background: var(--primary); border: none; padding: 10px 25px; border-radius: 40px; cursor: pointer; font-weight: bold; color: #0f172a; }

        .section-title { width: 100%; max-width: 800px; font-size: 1.4rem; color: var(--primary); margin: 20px 0; text-align: left; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        
        #resultArea { width: 100%; max-width: 800px; margin-bottom: 20px; }
        .slang-card { background: var(--card); padding: 25px; border-radius: 15px; border-left: 6px solid var(--primary); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .word-title { font-size: 1.8rem; font-weight: bold; color: var(--primary); text-transform: capitalize; }
        .meaning { font-size: 1.1rem; line-height: 1.7; color: #cbd5e1; margin-top: 10px; }

        /* Trending Word Buttons (Pills) */
        .trending-grid { width: 100%; max-width: 800px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .word-pill { background: #1e293b; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #334155; transition: 0.3s; font-weight: bold; font-size: 0.9rem; }
        .word-pill:hover { border-color: var(--primary); background: #2d3d54; color: var(--primary); }

        .loading { display: none; color: var(--primary); margin: 10px; }
        footer { margin-top: 50px; opacity: 0.5; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <div class="header">
        <h1>SlangPedia ⚡</h1>
        <p>Global Multi-Language Smart Dictionary</p>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search any word or click below...">
        <button id="searchBtn" onclick="smartSearch()">Search</button>
    </div>

    <div id="resultArea">
        <div id="loader" class="loading">Searching...</div>
        <div id="dynamicResult"></div>
    </div>

    <div class="section-title">🔥 25+ Viral Words (Touch to See Meaning)</div>
    <div class="trending-grid" id="pillContainer"></div>

    <footer>&copy; 2026 SlangPedia - Multi-Language Enabled</footer>

    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
        }

        const mySlangs = {
            "rizz": "Rizz refers to a person's ability to attract or charm a romantic partner. It is a shortened form of the word 'charisma' and is widely used on TikTok and Instagram.",
            "sigma": "A sigma is an independent, successful, and self-reliant individual who avoids social hierarchies. It is often referred to as the 'lone wolf' of the personality types.",
            "aura": "Aura is the distinct atmosphere or energy that surrounds a person. In Gen-Z culture, one can gain or lose 'aura points' based on their behavior or social coolness.",
            "skibidi": "Originally from a meme series, it has evolved into a general slang term used by younger generations to describe something weird, bad, or as a filler word in jokes.",
            "gyatt": "Gyatt is a slang exclamation used when someone is impressed by a person's physical appearance. It is an enthusiastic and loud pronunciation of 'God damn'.",
            "fanum tax": "A term popularized by streamer Kai Cenat and Fanum, meaning to steal a portion of someone's food as a playful 'tax' among friends.",
            "cooked": "To be 'cooked' means you are in a hopeless situation, have no chance of success, or are in big trouble. For example, 'I failed my exam, I'm cooked.'",
            "mewing": "Mewing is a facial exercise involving tongue placement on the roof of the mouth to sharpen the jawline. It is often used with a finger-on-lips gesture.",
            "delulu": "Short for delusional. It is used to describe someone who has unrealistic expectations, especially about romance or life goals, often in a humorous way.",
            "sus": "Short for suspicious. Used to describe someone acting strangely or dishonestly. It became world-famous because of the game 'Among Us'.",
            "no cap": "Used to emphasize that you are telling the truth and not lying or bragging. It basically means 'I am serious' or 'No lie'.",
            "bet": "A slang term used to express agreement or approval. It is similar to saying 'OK', 'Sure', or 'Let's do it'.",
            "poggers": "An expression used to show excitement, surprise, or joy, especially during gaming or when something cool happens.",
            "slay": "To do something exceptionally well, to look very stylish, or to be highly successful in a task. It is a term of high praise.",
            "stan": "An extremely devoted or obsessive fan of a celebrity or brand. It combines the words 'stalker' and 'fan'.",
            "vibe check": "A quick assessment of someone's mood or the energy of a room to see if it is positive or fits the current situation.",
            "tea": "Slang for gossip. To 'spill the tea' means to share juicy secrets or news about someone else's life.",
            "ghosting": "The act of suddenly cutting off all communication with someone without any explanation, usually in a dating context.",
            "glow up": "A significant improvement in a person's appearance, confidence, or style over a period of time.",
            "clout": "The influence, power, or fame that a person has on social media. Often used in the context of people doing things just for attention.",
            "lowkey": "Used to describe a feeling or action that is secret, quiet, or not obvious. For example, 'I lowkey like this song'.",
            "highkey": "The opposite of lowkey. It means openly, clearly, and loudly. You want everyone to know your opinion.",
            "ratio": "When a reply on social media gets more likes than the original post, indicating that the original post was widely disliked.",
            "gatekeep": "The act of hiding information about something cool (like a song or shop) to prevent it from becoming too popular.",
            "main character": "Someone who carries themselves with confidence and acts as if they are the star of their own movie.",
            "situationship": "A romantic relationship that is undefined and lacks a formal label, sitting somewhere between a friendship and a committed partnership.",
            "beige flag": "A trait in a person that is not necessarily good (red flag) or bad (green flag), but is just weird or boring."
        };

        const pillContainer = document.getElementById('pillContainer');
        Object.keys(mySlangs).forEach(word => {
            let pill = document.createElement('div');
            pill.className = 'word-pill';
            pill.innerText = word.toUpperCase();
            pill.onclick = () => {
                document.getElementById('searchInput').value = word;
                showResult(word, mySlangs[word], "Viral Trending");
                window.scrollTo({top: 0, behavior: 'smooth'});
            };
            pillContainer.appendChild(pill);
        });

        async function smartSearch() {
            const input = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultDiv = document.getElementById('dynamicResult');
            const loader = document.getElementById('loader');
            if (!input) return;
            resultDiv.innerHTML = "";
            loader.style.display = "block";

            if (mySlangs[input]) {
                loader.style.display = "none";
                showResult(input, mySlangs[input], "Viral Trending");
                return;
            }

            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${input}`);
                const data = await response.json();
                loader.style.display = "none";
                if (data.title) {
                    resultDiv.innerHTML = `<div class="slang-card">Word not found. Try one of the trending words below!</div>`;
                } else {
                    showResult(data[0].word, data[0].meanings[0].definitions[0].definition, data[0].meanings[0].partOfSpeech);
                }
            } catch (e) {
                loader.style.display = "none";
                resultDiv.innerHTML = `<div class="slang-card">Search Error. Check internet connection.</div>`;
            }
        }

        function showResult(word, meaning, type) {
            document.getElementById('dynamicResult').innerHTML = `
                <div class="slang-card">
                    <div style="color:var(--primary); font-size:0.8rem; font-style:italic;">${type}</div>
                    <div class="word-title">${word}</div>
                    <div class="meaning">${meaning}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
