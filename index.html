<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlangPedia | Viral Slang & Global Dictionary</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        #searchInput { width: 85%; max-width: 500px; padding: 15px; border-radius: 30px; border: 2px solid #00ff88; font-size: 18px; margin-bottom: 20px; outline: none; background: #1e293b; color: white; }
        .slang-card { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: left; border-left: 5px solid #00ff88; display: block; }
        .word { font-size: 22px; font-weight: bold; color: #00ff88; }
        .definition { margin-top: 5px; color: #cbd5e1; }
        #notFound { display: none; padding: 20px; background: #334155; border-radius: 15px; }
        .google-btn { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #00ff88; color: #0f172a; text-decoration: none; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>SlangPedia ⚡</h1>
    <p>Trending words & Global Meanings</p>
    <input type="text" id="searchInput" onkeyup="searchSlang()" placeholder="Search any word (e.g. Rizz)...">

    <div id="slangList">
        <div class="slang-card">
            <div class="word">Rizz</div>
            <div class="definition">Charisma or the ability to attract a partner.</div>
        </div>
        <div class="slang-card">
            <div class="word">Sigma</div>
            <div class="definition">Independent, successful, and self-reliant person.</div>
        </div>
        <div class="slang-card">
            <div class="word">Aura</div>
            <div class="definition">The energy or vibe someone radiates.</div>
        </div>
    </div>

    <div id="notFound">
        <p>Oops! Ye word hamari trending list mein nahi hai.</p>
        <p id="missingWordText"></p>
        <a href="#" id="googleSearchLink" target="_blank" class="google-btn">Google par iska matlab dekhein</a>
    </div>

    <script>
        function searchSlang() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('slang-card');
            let slangList = document.getElementById('slangList');
            let notFound = document.getElementById('notFound');
            let foundCount = 0;

            if (input.length === 0) {
                notFound.style.display = "none";
                slangList.style.display = "block";
                for (let i = 0; i < cards.length; i++) cards[i].style.display = "block";
                return;
            }

            for (let i = 0; i < cards.length; i++) {
                let text = cards[i].innerText.toLowerCase();
                if (text.includes(input)) {
                    cards[i].style.display = "block";
                    foundCount++;
                } else {
                    cards[i].style.display = "none";
                }
            }

            if (foundCount === 0) {
                slangList.style.display = "none";
                notFound.style.display = "block";
                document.getElementById('missingWordText').innerText = "Search result for: " + input;
                document.getElementById('googleSearchLink').href = "https://www.google.com/search?q=meaning+of+" + input;
            } else {
                slangList.style.display = "block";
                notFound.style.display = "none";
            }
        }
    </script>
</body>
</html>
