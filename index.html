<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlangPedia | Global Smart Dictionary</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 5px; }
        
        .search-box { width: 100%; max-width: 500px; position: relative; margin-bottom: 30px; }
        #searchInput { width: 100%; padding: 15px 25px; border-radius: 30px; border: 2px solid var(--primary); background: var(--card); color: white; font-size: 1.1rem; outline: none; box-sizing: border-box; }
        #searchBtn { position: absolute; right: 10px; top: 7px; background: var(--primary); border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; color: #0f172a; }

        .section-title { width: 100%; max-width: 600px; font-size: 1.2rem; color: var(--primary); margin-bottom: 15px; text-align: left; }
        
        #resultArea { width: 100%; max-width: 600px; margin-bottom: 30px; }
        
        .slang-card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--primary); animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .word-title { font-size: 1.6rem; font-weight: bold; color: var(--primary); text-transform: capitalize; }
        .meaning { margin-top: 10px; line-height: 1.6; color: #cbd5e1; }
        .type { font-style: italic; color: #94a3b8; font-size: 0.9rem; }
        
        #trendingSection { width: 100%; max-width: 600px; }
        .loading { display: none; color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <h1>SlangPedia ⚡</h1>
        <p>Trending Slangs & Global Meanings</p>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search any word (e.g. Rizz, What, Love)...">
        <button id="searchBtn" onclick="smartSearch()">Search</button>
    </div>

    <div id="resultArea">
        <div id="loader" class="loading">Searching global database...</div>
        <div id="dynamicResult"></div>
    </div>

    <div class="section-title">🔥 Trending Right Now</div>
    <div id="trendingSection">
        <div class="slang-card">
            <div class="word-title">Rizz</div>
            <div class="meaning">Charisma or ability to attract a partner. Short for 'Charisma'.</div>
        </div>
        <div class="slang-card">
            <div class="word-title">Aura</div>
            <div class="meaning">The vibe or energy someone radiates. Can be positive or negative.</div>
        </div>
    </div>

    <script>
        // 1. Trending words ki list (Yahan aap aur add kar sakte hain)
        const mySlangs = {
            "rizz": "Charisma or the ability to attract a partner.",
            "sigma": "Independent, successful, and self-reliant person.",
            "aura": "The energy or vibe someone radiates.",
            "cooked": "Being in a very bad situation or defeated."
        };

        async function smartSearch() {
            const input = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultDiv = document.getElementById('dynamicResult');
            const loader = document.getElementById('loader');
            
            if (!input) return;

            resultDiv.innerHTML = "";
            loader.style.display = "block";

            // STEP 1: Pehle apni list mein check karo
            if (mySlangs[input]) {
                loader.style.display = "none";
                showResult(input, mySlangs[input], "Trending Slang");
                return;
            }

            // STEP 2: Agar wahan nahi mila, toh Global Dictionary API se poocho
            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${input}`);
                const data = await response.json();

                loader.style.display = "none";

                if (data.title === "No Definitions Found") {
                    resultDiv.innerHTML = `<div class="slang-card">Word not found. Try another word!</div>`;
                } else {
                    const word = data[0].word;
                    const meaning = data[0].meanings[0].definitions[0].definition;
                    const partOfSpeech = data[0].meanings[0].partOfSpeech;
                    showResult(word, meaning, partOfSpeech);
                }
            } catch (error) {
                loader.style.display = "none";
                resultDiv.innerHTML = `<div class="slang-card">Error connecting to database.</div>`;
            }
        }

        function showResult(word, meaning, type) {
            const resultDiv = document.getElementById('dynamicResult');
            resultDiv.innerHTML = `
                <div class="slang-card">
                    <div class="type">${type}</div>
                    <div class="word-title">${word}</div>
                    <div class="meaning">${meaning}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
